<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    <script src="utilities.js"></script>
  </head>
<body class="bg-yellow-100 flex flex-col items-center justify-center h-screen font-mono">
    <div x-data="{
    names: ['Walter', 'Jesse', 'Gus', 'Saul', 'Hank', 'Skyler', 'Ted', 'Marie', 'Tuco', 'Mike'],
    current: 'Click to get a random name!'
  }">
    <h1 x-text="current"></h1>
    <button @click="current = names[Math.floor(Math.random() * names.length)]"
      class="bg-brown-500 hover:bg-blue-600 active:scale-95 text-white font-semibold px-6 py-3 rounded-xl shadow-md cursor-pointer transition-all duration-150">
      Get Random Name
    </button>
  </body>
</html>
